<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishaSetu Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        
        tr:hover {
            background: #f9fafb;
        }
        
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .role-admin {
            background: #fef3c7;
            color: #92400e;
        }
        
        .role-user {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        
        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 DishaSetu Admin Panel</h1>
            <p>Manage users and assign admin roles</p>
        </div>
        
        <div id="message"></div>
        
        <!-- Get Token Card -->
        <div class="card">
            <h2>🔑 Authentication</h2>
            <p style="margin-bottom: 20px; color: #666;">Login first to manage users. Use your phone number or Google account.</p>
            
            <div class="form-group">
                <label>Phone Number (10 digits)</label>
                <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
            </div>
            
            <div class="form-group">
                <label>OTP (if you already requested)</label>
                <input type="text" id="otp" placeholder="6-digit OTP">
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
                <button class="btn btn-secondary" onclick="verifyOTP()">Verify & Login</button>
            </div>
            
            <div style="margin-top: 20px; padding: 15px; background: #f9fafb; border-radius: 8px;">
                <strong>Token:</strong> <span id="token-display">Not logged in</span>
                <button class="btn btn-secondary" style="margin-left: 10px; padding: 6px 12px;" onclick="loadUsers()">Refresh Users</button>
            </div>
        </div>
        
        <!-- Users List -->
        <div class="card">
            <h2>👥 All Users</h2>
            <div id="users-container">
                <div class="loader"></div>
            </div>
        </div>
    </div>
    
<script>
const API_URL = 'http://localhost:8080/api';
let authToken = localStorage.getItem('admin_token') || '';

if (authToken) {
    document.getElementById('token-display').textContent = authToken.substring(0, 20) + '...';
    loadUsers();
}

function showMessage(message, type = 'success') {
    const messageDiv = document.getElementById('message');
    messageDiv.className = `message message-${type}`;
    messageDiv.textContent = message;
    setTimeout(() => {
        messageDiv.innerHTML = '';
        messageDiv.className = '';
    }, 5000);
}

async function sendOTP() {
    const phone = document.getElementById('phone').value;
    
    if (!phone || phone.length !== 10) {
        showMessage('Please enter a valid 10-digit phone number', 'error');
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/auth/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showMessage(`OTP sent to ${phone}. OTP: ${data.otp || 'Check your phone'}`, 'success');
        } else {
            showMessage(data.error || 'Failed to send OTP', 'error');
        }
    } catch (err) {
        showMessage('Network error: ' + err.message, 'error');
    }
}

async function verifyOTP() {
    const phone = document.getElementById('phone').value;
    const otp = document.getElementById('otp').value;
    
    if (!phone || !otp) {
        showMessage('Please enter both phone number and OTP', 'error');
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/auth/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, otp })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            authToken = data.token;
            localStorage.setItem('admin_token', authToken);
            document.getElementById('token-display').textContent = authToken.substring(0, 20) + '...';
            showMessage('Login successful!', 'success');
            loadUsers();
        } else {
            showMessage(data.error || 'Login failed', 'error');
        }
    } catch (err) {
        showMessage('Network error: ' + err.message, 'error');
    }
}

async function loadUsers() {
    if (!authToken) {
        showMessage('Please login first', 'error');
        return;
    }
    
    document.getElementById('users-container').innerHTML = '<div class="loader"></div>';
    
    try {
        // First, get current user to check if admin
        const meResponse = await fetch(`${API_URL}/auth/me`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });
        
        if (!meResponse.ok) {
            throw new Error('Authentication failed. Please login again.');
        }
        
        const currentUser = await meResponse.json();
        
        // Fetch all users if admin
        let users = [];
        
        if (currentUser.role === 'admin') {
            const usersResponse = await fetch(`${API_URL}/admin/users`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            
            if (usersResponse.ok) {
                const data = await usersResponse.json();
                users = data.users;
            } else {
                users = [currentUser];
            }
        } else {
            users = [currentUser];
        }
        
        renderUsers(users, currentUser);
        
    } catch (err) {
        document.getElementById('users-container').innerHTML = 
            `<p style="color: #991b1b;">Error loading users: ${err.message}</p>`;
    }
}

function renderUsers(users, currentUser) {
    const isAdmin = currentUser.role === 'admin';
    
    const html = `
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Civic Points</th>
                    ${isAdmin ? '<th>Actions</th>' : ''}
                </tr>
            </thead>
            <tbody>
                ${users.map(user => `
                    <tr>
                        <td>${user.name || 'N/A'}</td>
                        <td>${user.phone || user.google_id || 'Guest'}</td>
                        <td>
                            <span class="role-badge role-${user.role}">
                                ${user.role.toUpperCase()}
                            </span>
                        </td>
                        <td>${user.civic_points || 0}</td>
                        ${isAdmin ? `
                            <td>
                                <select onchange="updateUserRole('${user.id}', this.value)">
                                    <option value="">Change Role</option>
                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>
                            </td>
                        ` : ''}
                    </tr>
                `).join('')}
            </tbody>
        </table>
        
        ${!isAdmin ? `
            <div style="margin-top: 20px; padding: 15px; background: #fef3c7; border-radius: 8px; color: #92400e;">
                ⚠️ <strong>Note:</strong> You are not an admin. Run <code>node scripts/setup-admin.js --phone=${currentUser.phone}</code> in the backend to promote yourself.
            </div>
        ` : ''}
    `;
    
    document.getElementById('users-container').innerHTML = html;
}

async function updateUserRole(userId, newRole) {
    if (!newRole) return;
    
    if (!confirm(`Are you sure you want to change this user's role to ${newRole.toUpperCase()}?`)) {
        loadUsers(); // Reload to reset dropdown
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/admin/users/${userId}/role`, {
            method: 'PATCH',
            headers: {
                'Authorization': `Bearer ${authToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ role: newRole })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showMessage(`User role updated to ${newRole} successfully!`, 'success');
            loadUsers();
        } else {
            showMessage(data.error || 'Failed to update role', 'error');
            loadUsers();
        }
    } catch (err) {
        showMessage('Error updating role: ' + err.message, 'error');
        loadUsers();
    }
}
</script>
</body>
</html>
